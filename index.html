<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Listilla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/datos.js"></script>
</head>

<body>

    <div class="container my-4">
        <div class="row text-center">
            <div class="col-12">
                <h1 class="texto">Cositas para Noé mientras se recupera</h1>
            </div>
            <div class="col-12 mt-4">
                <img class="img-fluid emoji"
                    src="https://i.pinimg.com/originals/fc/bb/84/fcbb84b94b6c8c0126a374097e9bf6c4.gif" alt="">
            </div>
        </div>
    </div>

    <div class="container mt-4 mb-5">

        <div class="dropdown mb-4">
            <button class="btn btn-outline-primary rounded-0 dropdown-toggle" type="button" id="filtroCards"
                data-bs-toggle="dropdown" aria-expanded="false">
                Filtrar
            </button>
            <ul class="dropdown-menu" aria-labelledby="filtroCards">
                <li><a class="dropdown-item filtro-opcion" href="#" data-categoria="todas">Todos</a></li>
                <li><a class="dropdown-item filtro-opcion" href="#" data-categoria="pelicula">Películas</a></li>
                <li><a class="dropdown-item filtro-opcion" href="#" data-categoria="serie">Series</a></li>
                <li><a class="dropdown-item filtro-opcion" href="#" data-categoria="libro">Libros</a></li>
                <li><a class="dropdown-item filtro-opcion" href="#" data-categoria="manga">Manga</a>
                </li>
            </ul>
        </div>


        <div class="row row-cols-1 row-cols-md-3 g-4" id="contenedor-cards"></div>

    </div>


    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
